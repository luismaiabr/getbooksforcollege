services:
  bookgateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookgateway
    restart: unless-stopped

    ports:
      - "100.101.78.95:8002:8001"   # MCP SSE (host IP 100.101.78.95 → container 8001)
      - "100.101.78.95:8003:8000"   # FastAPI (host IP 100.101.78.95 → container 8000)
      - "8080:8080"                   # OAuth callback (VS Code auto-forwards to local browser)

    env_file:
      - .env

    environment:
      # Override cache path to the Docker volume mount point
      BOOKS_CACHE_DIR: /data/complete_books
      # Signal that we're running in Docker
      DOCKER_ENV: "1"
      # Public IP/hostname used as the OAuth redirect URI (must be registered
      # in Google Cloud Console → Credentials → Authorized Redirect URIs as
      # http://100.101.78.95:8080/)
      OAUTH_REDIRECT_HOST: "100.101.78.95"

    volumes:
      # Persistent book cache (PDFs and excerpts)
      - books_cache:/data/complete_books
      # OAuth token — named volume so Docker never mistakenly creates it as a directory
      - oauth_token:/app/token_store
      # OAuth credentials (read-only; MUST exist on host before starting)
      # Run: cp /path/to/your/credentials.json ./credentials.json
      - ./credentials.json:/app/credentials.json:ro

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  books_cache:
    driver: local
  oauth_token:
    driver: local
